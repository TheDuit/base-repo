services:
  postgres:
    image: postgres:16-alpine
    container_name: base-system-postgres-prod
    environment:
      POSTGRES_DB: base_system
      POSTGRES_USER: base_system
      POSTGRES_PASSWORD: base_system_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U base_system -d base_system"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: base-system-dynamodb-prod
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    user: root
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_prod_data:/home/dynamodblocal/data

  api:
    build:
      context: .
      dockerfile: docker/api.prod.Dockerfile
    container_name: base-system-api-prod
    command: sh -c "npm run migration:run -w apps/api && node apps/api/dist/main.js"
    environment:
      APP_ENV: production
      SYSTEM_MANIFEST_PATH: /app/system.manifest.json
      PORT: 4000
      JWT_SECRET: local-development-secret-change-me
      JWT_EXPIRES_IN_SECONDS: 3600
      CORS_ORIGIN: http://localhost:3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: base_system
      POSTGRES_PASSWORD: base_system_local
      POSTGRES_DB: base_system
      POSTGRES_SSL: "false"
      ADMIN_BOOTSTRAP_ON_STARTUP: "true"
      ADMIN_EMAIL: admin@base.local
      ADMIN_PASSWORD: local-prod-admin-1234
      ADMIN_NAME: Back Office Admin
      AWS_REGION: us-east-1
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      S3_BUCKET: base-system-local
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      dynamodb:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
    container_name: base-system-web-prod
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_prod_data:
  dynamodb_prod_data:
